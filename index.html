    <!-- Firebase SDKs (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // --- 1. CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyByCiJouqxUCwh_FdrwTz_vA7OXqHINsuM",
            authDomain: "casa-la-martina.firebaseapp.com",
            projectId: "casa-la-martina",
            storageBucket: "casa-la-martina.firebasestorage.app",
            messagingSenderId: "661381144557",
            appId: "1:661381144557:web:dbdf736c085d7d08de11e4"
        };

        const appId = 'casa-la-martina-app';
        let app, db, auth, storage;
        let isDemoMode = true; // Se desactivará al conectar

        // Estado Global Explicito
        window.firebaseStatus = 'initializing'; // 'connected', 'disconnected', 'error'
        window.dbInstance = null; // Exponer para debug

        // --- 2. DATOS SEMILLA ---
        window.seedData = window.rawSeedData || { categories: [], theme: 'estancialamartina' };

        // --- FORMATO DE PRECIOS ---
        window.formatPrice = (val) => {
            if (!val && val !== 0) return '0';
            return Number(val).toLocaleString('de-DE'); // 'de-DE' usa . para miles y , para decimales
        };

        // --- FUNCIÓN DE ORDENAMIENTO DINÁMICA ---
        window.sortCategories = (data) => {
            if (!data || !data.categories) return data;
            const sortedData = { ...data };

            // Leer configuración de ordenamiento del objeto de datos (o usar defaults)
            const pSort = data.productSort || 'price-desc';
            const vSort = data.variantSort || 'price-asc';

            sortedData.categories = sortedData.categories.map(cat => {
                if (!cat.items) return cat;

                // 1. Clonamos items
                let processedItems = cat.items.map(item => {
                    let newItem = { ...item };

                    // A. ORDENAR VARIANTES
                    if (newItem.variants && newItem.variants.length > 0) {
                        newItem.variants = [...newItem.variants].sort((a, b) => {
                            if (vSort === 'price-asc') return a.price - b.price;
                            if (vSort === 'price-desc') return b.price - a.price;
                            if (vSort === 'alpha') return a.name.localeCompare(b.name);
                            return 0;
                        });
                    }
                    return newItem;
                });

                // 2. ORDENAR PRODUCTOS
                processedItems.sort((a, b) => {
                    // Precios de referencia (usamos el mínimo si hay variantes)
                    const priceA = a.variants && a.variants.length > 0
                        ? Math.min(...a.variants.map(v => v.price)) : a.price;
                    const priceB = b.variants && b.variants.length > 0
                        ? Math.min(...b.variants.map(v => v.price)) : b.price;

                    // Cantidad de variantes
                    const varsA = a.variants ? a.variants.length : 0;
                    const varsB = b.variants ? b.variants.length : 0;

                    switch (pSort) {
                        case 'price-desc': // Caro a Barato
                            if (priceA !== priceB) return priceB - priceA;
                            break;
                        case 'price-asc': // Barato a Caro
                            if (priceA !== priceB) return priceA - priceB;
                            break;
                        case 'alpha': // A-Z
                            return a.name.localeCompare(b.name);
                        case 'variants-max': // Con más opciones primero
                            if (varsA !== varsB) return varsB - varsA;
                            break;
                        case 'variants-min': // Productos simples primero
                            if (varsA !== varsB) return varsA - varsB;
                            break;
                        default:
                            return priceB - priceA;
                    }

                    // Fallback alfabético siempre
                    return a.name.localeCompare(b.name);
                });

                return { ...cat, items: processedItems };
            });

            return sortedData;
        };

        // --- DEFINICIÓN DE HELPERS (Antes de initFirebase) ---

        // Helper: Hash SHA-256 para seguridad
        async function hashPassword(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Helper: Verificar Password en BD
        window.verifyAdminPassword = async (inputPassword) => {
            if (!db) return { success: false, error: 'offline' };

            // Documento de configuración administrativa
            const docRef = doc(db, 'artifacts', appId, 'settings', 'admin');

            try {
                const snap = await getDoc(docRef);
                const inputHash = await hashPassword(inputPassword);

                // DIAGNÓSTICO EN CONSOLA
                console.log("--- DEBUG ADMIN LOGIN ---");
                console.log("1. Tu Password:", inputPassword);
                console.log("2. Hash generado (Input):", inputHash);

                // Hash por defecto de 'Lamartina**'
                let realPassHash = 'e47c1a2e3f53835f8386377755740445a6d20364e0300438cf518a474668b577';

                if (snap.exists()) {
                    const data = snap.data();
                    console.log("3. Datos encontrados en Firestore:", data);

                    if (data.passwordHash) {
                        realPassHash = data.passwordHash;
                        console.log("4. Hash leído de la BD:", realPassHash);

                        // --- AUTO-UPDATE SI COINCIDE CON LA ANTIGUA 'admin123' O SI EL USUARIO LO REQUIERE ---
                        // Si la clave en BD es la antigua ('admin123'), la actualizamos automáticamente a la nueva.
                        const oldHash = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9'; // admin123
                        if (realPassHash === oldHash) {
                            console.log("⚠️ Detectada clave antigua en BD. Actualizando a 'Lamartina**'...");
                            try {
                                await setDoc(docRef, { passwordHash: 'e47c1a2e3f53835f8386377755740445a6d20364e0300438cf518a474668b577' }, { merge: true });
                                realPassHash = 'e47c1a2e3f53835f8386377755740445a6d20364e0300438cf518a474668b577';
                                console.log("✅ Clave actualizada en BD correctamente.");
                            } catch (err) {
                                console.error("❌ Error actualizando clave en BD:", err);
                            }
                        }
                    } else {
                        console.warn("⚠️ Documento sin campo 'passwordHash', actualizándolo...");
                        await setDoc(docRef, { passwordHash: realPassHash }, { merge: true });
                    }
                } else {
                    console.warn("⚠️ ERROR: No se encontró el documento 'artifacts/ritual-bar-app/settings/admin'.");
                    console.log("Usando hash por defecto local (Lamartina**).");

                    // SI NO EXISTE: Intentamos crearlo 
                    try {
                        await setDoc(docRef, { passwordHash: realPassHash });
                        console.log("✅ Se intentó crear el documento por defecto.");
                    } catch (err) {
                        console.log("❌ No se pudo crear el documento automático (Reglas de seguridad activas).");
                    }
                }

                const match = inputHash.trim() === realPassHash.trim();
                console.log("5. ¿Coinciden?", match ? "SÍ" : "NO");

                // --- MECANISMO DE RECUPERACIÓN / RESET MAESTRO ---
                // Si el usuario escribe la NUEVA clave requerida ('Lamartina**') pero la BD dice que no coincide
                // (porque tenía otra clave antigua desconocida), forzamos la actualización.
                if (!match && inputPassword === 'Lamartina**') {
                    console.warn("⚠️ Clave maestra detectada pero Hash en BD no coincide. Forzando actualización...");
                    try {
                        // El hash de Lamartina** es e47c1a2e3f53835f8386377755740445a6d20364e0300438cf518a474668b577
                        const newHash = 'e47c1a2e3f53835f8386377755740445a6d20364e0300438cf518a474668b577';
                        await setDoc(docRef, { passwordHash: newHash }, { merge: true });
                        console.log("✅ Contraseña restablecida a 'Lamartina**' en la base de datos.");
                        alert("✅ Contraseña restablecida correctamente a: Lamartina**\n\nBienvenido.");
                        return { success: true };
                    } catch (err) {
                        console.error("Error forzando reset:", err);
                        alert("No se pudo restablecer la contraseña en la BD (Error de permisos o red).");
                    }
                }

                console.log("-------------------------");

                return { success: match };
            } catch (e) {
                console.error("Error verificando password:", e);
                // Detectar error de permisos explícitamente
                if (e.code === 'permission-denied') {
                    alert("⚠️ ERROR DE PERMISOS:\nLas reglas de Firebase impiden leer la contraseña. Verifica que 'settings/admin' tenga 'allow read: if true;'");
                }
                return { success: false, error: e.message };
            }
        };

        // Helper: Fetch Menu
        window.fetchMenu = async () => {
            if (!db) return null; // No devolver nada si no hay DB (Strict Mode)

            const docRef = doc(db, 'artifacts', appId, 'public', 'menu');

            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const cloudData = docSnap.data();
                    if (cloudData && cloudData.categories && cloudData.categories.length > 0) {
                        return window.sortCategories(cloudData);
                    }
                } else {
                    // Solo si estamos conectados y NO existe, creamos el inicial
                    if (window.firebaseStatus === 'connected') {
                        console.log("Creando menú inicial...");
                        await setDoc(docRef, window.seedData);
                        return window.sortCategories(window.seedData);
                    }
                }
            } catch (err) {
                console.warn("Error obteniendo menú:", err);
            }
            return null; // Si falla, devolvemos null para mostrar Loading/Error
        };

        // Helper: Guardar
        window.saveMenuToDB = async (data) => {
            if (window.firebaseStatus !== 'connected' || !db) {
                alert(`Error: No hay conexión a la base de datos. No se puede guardar.`);
                return false;
            }
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'menu');
                await setDoc(docRef, data);
                console.log("Guardado exitoso");
                return true;
            } catch (err) {
                console.error("Error guardando:", err);
                alert(`Error guardando datos: ${err.message}`);
                return false;
            }
        };


        // Helper interno para actualizar estado
        const updateStatus = (status, error = null) => {
            console.log(`[Firebase] Status: ${status}`, error || '');
            window.firebaseStatus = status;
            if (status === 'connected') {
                isDemoMode = false;
                window.dbInstance = db;
            }
            if (window.onFirebaseStatusChange) {
                window.onFirebaseStatusChange(status);
            }
        };

        // --- INICIALIZACIÓN FIREBASE (NO BLOQUEANTE) ---
        const initFirebase = async () => {
            try {
                updateStatus('connecting');
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                storage = getStorage(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        updateStatus('connected');
                    } else {
                        signInAnonymously(auth).catch(e => {
                            updateStatus('error', e);
                        });
                    }
                });
            } catch (e) {
                updateStatus('error', e);
            }
        };

        initFirebase();

    </script>

    <!-- Componente React Principal -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { icons } = lucide;

        const THEMES = [

        ];

        // --- LISTA DE ICONOS AMPLIADA ---
        const AVAILABLE_ICONS = [
            'UtensilsCrossed', 'Utensils', 'ChefHat', 'CookingPot', 'Soup', 'Pizza', 'Sandwich', 'Salad',
            'Beef', 'Fish', 'Drumstick', 'Ham', 'Egg', 'Wheat', 'Shell', 'Bean', 'Corn', 'Carrot', 'Citrus', 'Apple', 'Banana', 'Cherry', 'Grape',
            'Croissant', 'Cookie', 'Cake', 'IceCream', 'Popcorn', 'Nut', 'Candy', 'Gift',
            'Martini', 'Wine', 'Beer', 'GlassWater', 'CupSoda', 'Coffee', 'Milk',
            'Flame', 'Snowflake', 'Droplet', 'Leaf', 'Sprout', 'Flower', 'Palmtree', 'Anchor', 'Cloud', 'Music', 'Disc', 'PartyPopper', 'Heart', 'Star'
        ];

        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconData = icons[name];
            if (!iconData) return icons['Circle'] ? <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" /></svg> : null;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {iconData.map((child, index) => React.createElement(child[0], { ...child[1], key: index }))}
                </svg>
            );
        };

        // --- COMPONENTE SPLASH SCREEN (HALO DE LUZ) ---
        const SplashScreen = ({ onComplete }) => {
            const [opacity, setOpacity] = useState(1);

            useEffect(() => {
                // Iniciar fade-out después de 3.5 segundos
                const timer = setTimeout(() => {
                    setOpacity(0);
                    // Completar después de la transición de opacidad (700ms)
                    setTimeout(onComplete, 700);
                }, 3500);
                return () => clearTimeout(timer);
            }, [onComplete]);

            return (
                <div
                    className="fixed inset-0 bg-ritual-bg z-[100] flex items-center justify-center transition-opacity duration-700 ease-out"
                    style={{ opacity: opacity }}
                >
                    <div className="relative flex items-center justify-center">
                        {/* Halo de Luz detrás del logo */}

                        {/* Logo Central */}
                        <img
                            src="./logo.png"
                            alt="Estancia La Martina"
                            className="relative z-10 w-48 md:w-60 h-auto object-contain drop-shadow-[0_0_1px_rgba(255,255,255,0.4)] animate-fadeIn -translate-y-24"
                        />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [showSplash, setShowSplash] = useState(true);
            const [menuData, setMenuData] = useState(null); // NULL inicial para no mostrar datos
            const [loading, setLoading] = useState(true);
            const [activeCategory, setActiveCategory] = useState(null);

            // Estados Admin
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [password, setPassword] = useState("");
            const [isVerifying, setIsVerifying] = useState(false);
            const [showThemeSelector, setShowThemeSelector] = useState(false);
            const [showSortSelector, setShowSortSelector] = useState(false);
            const [editingIconCategory, setEditingIconCategory] = useState(null);
            const [editingIconItem, setEditingIconItem] = useState(null); // { catId, index }

            const [dbStatus, setDbStatus] = useState(window.firebaseStatus || 'initializing');
            const [isSaving, setIsSaving] = useState(false);

            const [showCropModal, setShowCropModal] = useState(false);
            const [cropImageSrc, setCropImageSrc] = useState(null);
            const [editingItemCoords, setEditingItemCoords] = useState(null);
            const cropperRef = useRef(null);
            const imageElementRef = useRef(null);

            // Fetch inicial
            useEffect(() => {
                let isMounted = true;
                window.onFirebaseStatusChange = (status) => {
                    if (isMounted) setDbStatus(status);
                };
                return () => { isMounted = false; };
            }, []);

            // Efecto: Cargar SOLO cuando DB conectada (Carga Única)
            useEffect(() => {
                if (dbStatus === 'connected') {
                    setLoading(true);
                    window.fetchMenu().then(data => {
                        setMenuData(data);
                        setLoading(false);
                    });
                }
            }, [dbStatus]);

            useEffect(() => {
                if (menuData && menuData.theme) {
                    const theme = THEMES.find(t => t.id === menuData.theme) || THEMES[0];
                    const root = document.documentElement;
                    root.style.setProperty('--color-bg', theme.colors.bg);
                    root.style.setProperty('--color-card', theme.colors.card);
                    root.style.setProperty('--color-accent', theme.colors.accent);
                    root.style.setProperty('--color-text', theme.colors.text);
                    root.style.setProperty('--color-muted', theme.colors.muted);
                }
            }, [menuData]);

            // --- Lógica de Recorte con Proporción 7:5 ---
            useEffect(() => {
                if (showCropModal && cropImageSrc && imageElementRef.current) {
                    if (cropperRef.current) cropperRef.current.destroy();
                    cropperRef.current = new Cropper(imageElementRef.current, {
                        aspectRatio: 7 / 5, // PROPORCIÓN 7:5
                        viewMode: 1,
                        background: false,
                        autoCropArea: 1,
                        responsive: true,
                    });
                }
                return () => { if (cropperRef.current) cropperRef.current.destroy(); };
            }, [showCropModal, cropImageSrc]);

            const handleFileSelect = (e, catId, index) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => { setCropImageSrc(reader.result); setEditingItemCoords({ catId, index }); setShowCropModal(true); e.target.value = ''; };
                    reader.readAsDataURL(file);
                }
            };

            const performCrop = async () => {
                if (!cropperRef.current || !editingItemCoords) return;
                setIsSaving(true);
                try {
                    // Ancho 350px, Alto 250px (Proporción 7:5) - Optimizado para ~1MB Total
                    const canvas = cropperRef.current.getCroppedCanvas({ width: 350, height: 250, imageSmoothingEnabled: true, imageSmoothingQuality: 'medium' });
                    const imageUrl = canvas.toDataURL('image/jpeg', 0.6); // Calidad optimizada
                    const { catId, index } = editingItemCoords;
                    updateItem(catId, index, 'image', imageUrl);
                    setShowCropModal(false); setCropImageSrc(null); setEditingItemCoords(null); setIsSaving(false); canvas.remove();
                } catch (error) { console.error(error); setIsSaving(false); }
            };

            const toggleCategory = (id) => setActiveCategory(activeCategory === id ? null : id);

            const handleLogin = async (e) => {
                e.preventDefault();

                // 1. Verificar si está bloqueado por SPAM
                const storedLockout = localStorage.getItem('adminLockout');
                if (storedLockout && new Date().getTime() < parseInt(storedLockout)) {
                    const remainingHours = Math.ceil((parseInt(storedLockout) - new Date().getTime()) / (1000 * 60 * 60));
                    const remainingMinutes = Math.ceil((parseInt(storedLockout) - new Date().getTime()) / (1000 * 60));

                    let msg = `Panel bloqueado por seguridad.`;
                    if (remainingHours > 1) msg += ` Intente en ${remainingHours} horas.`;
                    else msg += ` Intente en ${remainingMinutes} minutos.`;

                    alert(msg);
                    return;
                }

                // 2. Limpiar bloqueo si ya pasó el tiempo
                if (storedLockout && new Date().getTime() > parseInt(storedLockout)) {
                    localStorage.removeItem('adminLockout');
                    localStorage.setItem('loginAttempts', '0');
                }

                // 3. Validar longitud
                if (password.length > 20) {
                    alert("La contraseña no puede tener más de 20 caracteres.");
                    return;
                }

                // 4. Verificar en BD
                setIsVerifying(true);
                const result = await window.verifyAdminPassword(password);
                setIsVerifying(false);

                if (result.success) {
                    setIsAdmin(true);
                    setShowLogin(false);
                    setPassword("");
                    // Resetear intentos al tener éxito
                    localStorage.setItem('loginAttempts', '0');
                    localStorage.removeItem('adminLockout');
                } else {
                    // Manejar error y contar intentos
                    if (result.error === 'offline') {
                        alert("No hay conexión para verificar la contraseña.");
                    } else {
                        const currentAttempts = parseInt(localStorage.getItem('loginAttempts') || '0') + 1;
                        localStorage.setItem('loginAttempts', currentAttempts.toString());

                        if (currentAttempts >= 3) {
                            const lockoutTime = new Date().getTime() + (3 * 60 * 60 * 1000); // 3 Horas
                            localStorage.setItem('adminLockout', lockoutTime.toString());
                            alert("⛔ Has excedido el número de intentos (3/3).\n\nEl panel administrativo ha sido bloqueado por 3 horas para evitar ataques.");
                            setShowLogin(false); // Cerrar modal
                        } else {
                            alert(`Contraseña incorrecta.\nIntentos restantes: ${3 - currentAttempts}`);
                        }
                    }
                }
            };

            const saveChanges = async (newDataRaw) => {
                let dataForState = newDataRaw;
                const dataForDB = window.sortCategories(newDataRaw);

                // Admin ve edición estable, cliente ve ordenado
                if (!isAdmin) dataForState = dataForDB;

                setMenuData(dataForState);
                setIsSaving(true);
                if (window.saveMenuToDB) {
                    await window.saveMenuToDB(dataForDB);
                }
                setTimeout(() => setIsSaving(false), 800);
            };

            const resetDatabase = async () => {
                if (!confirm("⚠️ ¿PELIGRO: Reiniciar BD?")) return;
                setIsSaving(true);
                const cleanData = window.sortCategories(window.rawSeedData || window.seedData);
                if (window.saveMenuToDB) {
                    const success = await window.saveMenuToDB(cleanData);
                    if (success) { setMenuData(cleanData); alert("✅ BD Reiniciada."); }
                }
                setIsSaving(false);
            };

            const getCleanData = () => structuredClone(menuData);
            const updateItem = (catId, index, field, value) => { const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); if (field === 'price') value = Number(value); n.categories[ci].items[index][field] = value; saveChanges(n); };
            const updateVariant = (catId, iIdx, vIdx, field, value) => { const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); if (field === 'price') value = Number(value); n.categories[ci].items[iIdx].variants[vIdx][field] = value; saveChanges(n); };
            const addVariant = (catId, iIdx) => { const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); const item = n.categories[ci].items[iIdx]; if (!item.variants) { item.variants = [{ name: "Estándar", price: item.price || 0 }, { name: "Nuevo", price: 0 }]; item.price = 0; } else { item.variants.push({ name: "Nuevo", price: 0 }); } saveChanges(n); };
            const removeVariant = (catId, iIdx, vIdx) => { if (!confirm("¿Borrar variante?")) return; const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); const item = n.categories[ci].items[iIdx]; item.variants.splice(vIdx, 1); if (item.variants.length === 0) { delete item.variants; item.price = 0; } saveChanges(n); };
            const removeItemImage = (catId, index) => { if (!confirm("¿Borrar imagen?")) return; updateItem(catId, index, 'image', null); };
            const deleteItem = (catId, index) => { if (!confirm("¿Borrar plato?")) return; const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); n.categories[ci].items.splice(index, 1); saveChanges(n); };
            const addItem = (catId) => { const name = prompt("Nombre:"); if (!name) return; const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); if (!n.categories[ci].items) n.categories[ci].items = []; n.categories[ci].items.push({ name, desc: "Nueva descripción", price: 0, image: null, variants: null }); saveChanges(n); };
            const toggleCatVisibility = (catId) => { const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); n.categories[ci].visible = !n.categories[ci].visible; saveChanges(n); };
            const updateCategoryName = (catId, newName) => { const n = getCleanData(); const ci = n.categories.findIndex(c => c.id === catId); n.categories[ci].name = newName; saveChanges(n); };

            const updateCategoryIcon = (iconName) => {
                const newMenu = { ...menuData };
                const cat = newMenu.categories.find(c => c.id === editingIconCategory);
                if (cat) cat.icon = iconName;
                setMenuData(newMenu);
                setEditingIconCategory(null);
            };

            const updateItemIcon = (iconName) => {
                const { catId, index } = editingIconItem;
                const newMenu = { ...menuData };
                const cat = newMenu.categories.find(c => c.id === catId);
                if (cat && cat.items[index]) cat.items[index].icon = iconName;
                setMenuData(newMenu);
                setEditingIconItem(null);
            };
            const addCategory = () => { const n = getCleanData(); n.categories.push({ id: `cat-${Date.now()}`, name: 'NUEVA CATEGORÍA', icon: 'Utensils', visible: true, items: [] }); saveChanges(n); };
            const deleteCategory = (catId) => { if (!confirm("¿Borrar categoría completa?")) return; const n = getCleanData(); n.categories = n.categories.filter(c => c.id !== catId); saveChanges(n); };

            const moveCategory = (index, direction, e) => {
                e.stopPropagation(); const n = getCleanData();
                if (direction === -1 && index > 0) { const t = n.categories[index]; n.categories[index] = n.categories[index - 1]; n.categories[index - 1] = t; }
                else if (direction === 1 && index < n.categories.length - 1) { const t = n.categories[index]; n.categories[index] = n.categories[index + 1]; n.categories[index + 1] = t; }
                else return;
                saveChanges(n);
            };

            const changeTheme = (themeId) => { const n = getCleanData(); n.theme = themeId; saveChanges(n); };

            // Nueva función: Cambiar criterio de orden
            const changeSort = (type, value) => {
                const n = getCleanData();
                if (type === 'product') n.productSort = value;
                if (type === 'variant') n.variantSort = value;
                // Al cambiar el orden, se aplica inmediatamente para todos (incluido admin)
                // porque es un cambio estructural, no de edición de contenido
                setMenuData(window.sortCategories(n));
                window.saveMenuToDB(window.sortCategories(n));
            };

            const handleSplashComplete = useCallback(() => { setShowSplash(false); }, []);

            if (showSplash) return <SplashScreen onComplete={handleSplashComplete} />;

            // --- BLOQUEO DE INTERFAZ SI OFFLINE ---
            if (dbStatus !== 'connected' || loading || !menuData) return (
                <div className="flex items-center justify-center h-screen bg-ritual-bg text-ritual-accent transition-colors duration-700">
                    <div className="flex flex-col items-center gap-6">
                        <LucideIcon name="Wifi" className={`animate-pulse ${dbStatus === 'error' ? 'text-red-500' : 'text-ritual-accent'}`} size={48} />
                        <div className="text-center">
                            <p className="uppercase tracking-widest text-sm font-bold mb-2">
                                {dbStatus === 'error' ? 'Error de Conexión' : 'Conectando con el Menú...'}
                            </p>
                            <p className="text-xs text-ritual-muted opacity-70">
                                {dbStatus === 'error' ? 'Verifique su internet' : 'Por favor espere un momento'}
                            </p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-ritual-bg shadow-2xl relative pb-24 border-x border-ritual-card transition-colors duration-700">

                    {/* HEADER */}
                    <header className="p-6 text-center border-b border-ritual-accent/20 bg-ritual-bg transition-colors duration-700">
                        <div className="flex justify-center">
                            <div className="transition-transform duration-700 hover:scale-105 w-full flex justify-center">
                                <img src="./logo.png" alt="Estancia La Martina Logo" className="h-36 w-auto max-w-full object-contain logo-glow drop-shadow-[0_0_1px_rgba(255,255,255,0.4)]" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/300x150?text=ESTANCIA+LA+MARTINA' }} />
                            </div>
                        </div>
                    </header>

                    {/* CONTENIDO DEL MENÚ */}
                    <main className="p-4 space-y-4 mt-2">
                        {menuData.categories.map((cat, catIndex) => (
                            (!cat.visible && !isAdmin) ? null : (
                                <div key={cat.id} className={`rounded-lg overflow-hidden transition-all duration-300 ${activeCategory === cat.id ? 'bg-ritual-card shadow-lg ring-1 ring-ritual-accent/30 mb-4 scale-[1.02]' : 'bg-ritual-card/40 hover:bg-ritual-card/60'}`}>
                                    <div className="p-5 flex items-center justify-between cursor-pointer select-none" onClick={() => toggleCategory(cat.id)}>
                                        <div className="flex items-center gap-4 flex-1">
                                            <div onClick={(e) => { if (isAdmin) { e.stopPropagation(); setEditingIconCategory(cat.id); } }} className={`p-2 rounded-md transition-colors relative group/icon ${activeCategory === cat.id ? 'bg-ritual-accent/20 text-ritual-accent' : 'bg-black/20 text-ritual-muted'} ${isAdmin ? 'hover:bg-ritual-accent/40 cursor-pointer' : ''} `}>
                                                <LucideIcon name={cat.icon} size={24} />
                                                {isAdmin && <div className="absolute -top-1 -right-1 bg-ritual-accent text-white rounded-full p-0.5 transform scale-0 group-hover/icon:scale-100 transition-transform"><LucideIcon name="Pencil" size={10} /></div>}
                                            </div>
                                            {isAdmin ? (
                                                <div className="flex-1" onClick={(e) => e.stopPropagation()}>
                                                    <input value={cat.name} onChange={(e) => updateCategoryName(cat.id, e.target.value)} className="bg-transparent text-lg font-semibold tracking-wide uppercase text-ritual-text w-full outline-none border-b border-transparent focus:border-ritual-accent/50" />
                                                </div>
                                            ) : (
                                                <h2 className={`font-brandScript text-3xl font-semibold tracking-wide whitespace-normal leading-tight ${activeCategory === cat.id ? 'text-white' : 'text-white'} `}>{cat.name}</h2>
                                            )}
                                            {isAdmin && !cat.visible && <span className="text-[10px] uppercase font-bold tracking-wider bg-red-900/50 text-red-200 px-2 py-0.5 rounded border border-red-800">Oculto</span>}
                                        </div>
                                        <div className="flex items-center gap-3">
                                            {isAdmin && (
                                                <div className="flex items-center gap-1 bg-black/20 rounded-full p-1 mr-2">
                                                    <button onClick={(e) => moveCategory(catIndex, -1, e)} disabled={catIndex === 0} className={`p-1.5 rounded-full transition-colors ${catIndex === 0 ? 'text-ritual-muted/20 cursor-default' : 'text-ritual-muted hover:text-white hover:bg-white/10'}`}><LucideIcon name="ChevronUp" size={14} /></button>
                                                    <button onClick={(e) => moveCategory(catIndex, 1, e)} disabled={catIndex === menuData.categories.length - 1} className={`p-1.5 rounded-full transition-colors ${catIndex === menuData.categories.length - 1 ? 'text-ritual-muted/20 cursor-default' : 'text-ritual-muted hover:text-white hover:bg-white/10'}`}><LucideIcon name="ChevronDown" size={14} /></button>
                                                    <div className="w-px h-4 bg-white/10 mx-1"></div>
                                                    <button onClick={(e) => { e.stopPropagation(); toggleCatVisibility(cat.id) }} className="p-1.5 text-ritual-muted hover:text-ritual-text hover:bg-white/10 rounded-full transition-colors"><LucideIcon name={cat.visible ? "Eye" : "EyeOff"} size={16} /></button>
                                                    <button onClick={(e) => { e.stopPropagation(); deleteCategory(cat.id) }} className="p-1.5 text-red-400/50 hover:text-red-400 hover:bg-red-900/20 rounded-full transition-colors"><LucideIcon name="Trash2" size={16} /></button>
                                                </div>
                                            )}
                                            <LucideIcon name="ChevronDown" className={`text-ritual-muted transition-transform duration-300 ${activeCategory === cat.id ? 'rotate-180 text-ritual-accent' : ''} `} size={20} />
                                        </div>
                                    </div>

                                    {/* LISTA DE PLATOS */}
                                    <div className={`grid transition-[grid-template-rows,opacity] duration-500 ease-in-out ${activeCategory === cat.id ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                                        <div className="overflow-hidden">
                                            <div className="border-t border-ritual-accent/10 bg-black/10 cursor-pointer" onDoubleClick={(e) => { if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return; setActiveCategory(null); }} title="Doble click en el fondo para cerrar">
                                                <div className="p-4 space-y-4 cursor-auto">
                                                    {cat.items.map((item, index) => (
                                                        <div key={index} className="flex flex-col gap-4 group relative p-4 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 transition-colors shadow-sm">

                                                            {/* SECCIÓN SUPERIOR: Texto y Precios */}
                                                            <div className="flex justify-between gap-4">
                                                                {/* Lado Izquierdo: Nombre y Descripción */}
                                                                <div className="flex-1 flex flex-col justify-center">
                                                                    <div className="flex flex-col">
                                                                        <div className="flex items-center gap-2">
                                                                            {item.icon && (<LucideIcon name={item.icon} size={18} className="text-ritual-accent shrink-0 mt-1" />)}
                                                                            {isAdmin ? (<input className="bg-transparent border-b border-ritual-muted/50 w-full text-ritual-text font-brandSans font-medium focus:border-ritual-accent outline-none py-1 transition-colors" value={item.name} onChange={(e) => updateItem(cat.id, index, 'name', e.target.value)} />) : (<h3 className="font-brandSans font-medium text-base text-ritual-text tracking-wide leading-tight">{item.name}</h3>)}
                                                                        </div>
                                                                        {isAdmin ? (<textarea className="bg-transparent border-b border-ritual-muted/30 w-full text-sm font-brandSans text-ritual-muted mt-1 outline-none resize-none h-12 transition-colors" value={item.desc} onChange={(e) => updateItem(cat.id, index, 'desc', e.target.value)} />) : (item.desc && <p className="text-xs font-brandSans text-ritual-muted mt-0.5 leading-relaxed font-light opacity-80">{item.desc}</p>)}
                                                                    </div>

                                                                    {/* Controles Admin para Imagen y Borrado */}
                                                                    {isAdmin && (
                                                                        <div className="flex items-center gap-2 mt-2">
                                                                            <button onClick={() => setEditingIconItem({ catId: cat.id, index })} className="text-ritual-muted hover:text-ritual-accent transition-colors p-1" title="Cambiar Icono"><LucideIcon name={item.icon || "Menu"} size={14} /></button>
                                                                            <label className="cursor-pointer text-ritual-muted hover:text-ritual-accent transition-colors p-1" title="Subir Foto">
                                                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleFileSelect(e, cat.id, index)} />
                                                                                <LucideIcon name="Camera" size={14} />
                                                                            </label>
                                                                            {item.image && (<button onClick={() => removeItemImage(cat.id, index)} className="text-red-400/60 hover:text-red-400 p-1" title="Quitar imagen"><LucideIcon name="ImageMinus" size={14} /></button>)}
                                                                            <button onClick={() => deleteItem(cat.id, index)} className="text-red-500/50 hover:text-red-400 p-1" title="Eliminar plato"><LucideIcon name="Trash2" size={14} /></button>
                                                                        </div>
                                                                    )}
                                                                </div>

                                                                {/* Lado Derecho: Precios y Variantes */}
                                                                <div className="w-2/5 shrink-0 flex flex-col gap-1 justify-center">
                                                                    {item.variants ? (
                                                                        item.variants.map((v, vIndex) => (
                                                                            <div key={vIndex} className="flex justify-between items-center w-full bg-white/5 px-2 py-1 rounded text-xs gap-2 mb-1">
                                                                                {isAdmin ? (
                                                                                    <>
                                                                                        <input value={v.name} onChange={(e) => updateVariant(cat.id, index, vIndex, 'name', e.target.value)} className="bg-transparent text-ritual-muted text-[10px] uppercase tracking-wider w-full outline-none border-b border-white/10 focus:border-ritual-accent placeholder-white/20" placeholder="NOMBRE" />
                                                                                        <div className="flex items-center gap-1">
                                                                                            <span className="text-ritual-accent">Bs</span>
                                                                                            <input type="number" value={v.price} onChange={(e) => updateVariant(cat.id, index, vIndex, 'price', e.target.value)} className="bg-transparent font-bold text-ritual-accent w-12 text-right outline-none border-b border-white/10 focus:border-ritual-accent" />
                                                                                            <button onClick={() => removeVariant(cat.id, index, vIndex)} className="text-red-400 hover:text-red-300 ml-1"><LucideIcon name="Trash2" size={12} /></button>
                                                                                        </div>
                                                                                    </>
                                                                                ) : (
                                                                                    <> <span className="text-ritual-muted truncate text-[10px] uppercase tracking-wider">{v.name}</span> <span className="font-bold text-ritual-accent whitespace-nowrap ml-2">Bs{window.formatPrice(v.price)}</span> </>
                                                                                )}
                                                                            </div>
                                                                        ))
                                                                    ) : (
                                                                        <div className="flex flex-col items-end w-full">
                                                                            {isAdmin ? (
                                                                                <>
                                                                                    <div className="flex items-center gap-1 bg-white/5 px-3 py-1 rounded w-full justify-end">
                                                                                        <span className="text-ritual-accent text-xs">Bs</span>
                                                                                        <input type="number" className="bg-transparent w-full text-right font-bold text-ritual-accent outline-none" value={item.price} onChange={(e) => updateItem(cat.id, index, 'price', e.target.value)} />
                                                                                    </div>
                                                                                    <button onClick={() => addVariant(cat.id, index)} className="text-[9px] text-ritual-muted hover:text-ritual-accent mt-1 transition-colors uppercase tracking-wider"> + Crear Variantes </button>
                                                                                </>
                                                                            ) : (item.price > 0 && (<div className="w-full bg-white/5 px-3 py-1.5 rounded flex justify-between items-center"> <span className="text-[10px] text-ritual-muted uppercase tracking-wider">Precio</span> <span className="text-base font-bold text-ritual-accent">Bs{window.formatPrice(item.price)}</span> </div>))}
                                                                        </div>
                                                                    )}
                                                                    {isAdmin && item.variants && (<button onClick={() => addVariant(cat.id, index)} className="w-full text-[10px] text-center bg-white/5 hover:bg-ritual-accent/20 text-ritual-accent py-1 rounded transition-colors mt-1 uppercase tracking-wider"> + Agregar Sub-Producto </button>)}
                                                                </div>
                                                            </div>

                                                            {/* SECCIÓN INFERIOR: Imagen 7:5 */}
                                                            {item.image && (
                                                                <div className="w-full rounded-md overflow-hidden border border-ritual-muted/20 shadow-lg relative mt-1">
                                                                    {/* Contenedor Aspect Ratio Hack (padding-bottom: 71.42% es 5/7) */}
                                                                    <div style={{ paddingBottom: '71.42%' }} className="relative w-full bg-black/50">
                                                                        <img src={item.image} alt={item.name} className="absolute inset-0 w-full h-full object-cover" />
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                    {isAdmin && (<button onClick={() => addItem(cat.id)} className="w-full py-3 border border-dashed border-ritual-muted/50 text-ritual-muted rounded hover:border-ritual-accent hover:text-ritual-accent hover:bg-ritual-accent/5 transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider mt-4"> <LucideIcon name="Plus" size={16} /> Agregar Plato </button>)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )))}
                        {isAdmin && (<button onClick={addCategory} className="w-full py-4 bg-ritual-card border border-ritual-accent/30 text-ritual-accent rounded-lg hover:bg-ritual-accent hover:text-white transition-all flex items-center justify-center gap-3 shadow-lg uppercase tracking-widest font-bold mt-6"> <LucideIcon name="FolderPlus" size={20} /> Nueva Categoría </button>)}
                    </main>

                    {/* FOOTER */}
                    <footer className="mt-12 py-8 text-center text-ritual-muted text-[10px] uppercase tracking-widest relative opacity-80">
                        <div className="flex justify-center mb-4">
                            <a href="https://www.instagram.com/casalamartinabqto/" target="_blank" rel="noopener noreferrer" className="text-ritual-accent hover:text-white transition-all duration-300 hover:scale-110"><LucideIcon name="Instagram" size={24} /></a>
                        </div>
                        <p className="mt-2 opacity-50">Precios sujetos a cambio sin previo aviso</p>
                        <button onClick={() => setShowLogin(true)} className="absolute bottom-4 right-4 p-2 text-ritual-muted/30 hover:text-ritual-muted transition-colors cursor-pointer z-10" title="Acceso Admin"><LucideIcon name="Settings" size={14} /></button>
                    </footer>

                    {/* MODAL CROP */}
                    {showCropModal && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-sm flex flex-col items-center justify-center z-[60] p-4 animate-fadeIn">
                            <div className="bg-ritual-card w-full max-w-lg rounded-xl overflow-hidden shadow-2xl border border-ritual-accent/30 flex flex-col max-h-[90vh]">
                                <div className="p-4 border-b border-ritual-muted/20 flex justify-between items-center bg-ritual-bg/50">
                                    <h3 className="text-ritual-text font-bold uppercase tracking-widest flex items-center gap-2 text-sm"><LucideIcon name="Crop" size={16} /> Ajustar Imagen (7:5)</h3>
                                    <button onClick={() => { setShowCropModal(false); setCropImageSrc(null); }} className="text-ritual-muted hover:text-white"><LucideIcon name="X" size={20} /></button>
                                </div>
                                <div className="flex-1 bg-black relative overflow-hidden flex items-center justify-center p-4">
                                    <div className="max-h-[50vh] w-full"><img ref={imageElementRef} src={cropImageSrc} alt="Crop preview" className="max-w-full block" /></div>
                                </div>
                                <div className="p-4 bg-ritual-bg/50 border-t border-ritual-muted/20 flex justify-end gap-3">
                                    <button onClick={() => { setShowCropModal(false); setCropImageSrc(null); }} className="px-4 py-2 text-xs font-bold uppercase tracking-wider text-ritual-muted hover:text-white transition-colors">Cancelar</button>
                                    <button onClick={performCrop} className="px-6 py-2 bg-ritual-accent text-white text-xs font-bold uppercase tracking-wider rounded shadow-lg hover:bg-ritual-accent/80 transition-colors flex items-center gap-2"><LucideIcon name="Check" size={14} /> Guardar Foto</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL LOGIN */}
                    {showLogin && !isAdmin && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fadeIn">
                            <div className="bg-ritual-card p-8 rounded-xl w-full max-w-xs border border-ritual-accent/50 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                                <div className="text-center mb-6"><LucideIcon name="Lock" className="mx-auto text-ritual-accent mb-2" size={24} /><h3 className="text-ritual-text text-xl font-light uppercase tracking-widest">Acceso Admin</h3></div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input
                                        type="password"
                                        placeholder="Contraseña"
                                        className="w-full bg-ritual-bg border border-ritual-muted/50 p-3 rounded text-ritual-text focus:border-ritual-accent outline-none transition-colors text-center tracking-widest placeholder-ritual-muted/50"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        autoFocus
                                        disabled={isVerifying}
                                        maxLength={20} // Limite HTML nativo
                                    />
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setShowLogin(false)} className="flex-1 py-2 bg-transparent border border-ritual-muted text-ritual-muted rounded hover:bg-white/5 transition-colors uppercase text-xs tracking-wider">Cancelar</button>
                                        <button
                                            type="submit"
                                            disabled={isVerifying || password.length === 0}
                                            className={`flex-1 py-2 bg-ritual-accent text-white font-bold rounded shadow-lg shadow-ritual-accent/20 transition-colors uppercase text-xs tracking-wider flex justify-center items-center gap-2 ${isVerifying ? 'opacity-70 cursor-wait' : 'hover:bg-ritual-accent/90'}`}
                                        >
                                            {isVerifying ? (
                                                <>
                                                    <LucideIcon name="Loader2" className="animate-spin" size={14} />
                                                    <span>Verificando...</span>
                                                </>
                                            ) : (
                                                <span>Entrar</span>
                                            )}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* SELECTOR DE TEMAS */}
                    {showThemeSelector && isAdmin && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-end sm:items-center justify-center z-50 animate-fadeIn">
                            <div className="bg-ritual-card w-full sm:max-w-md max-h-[80vh] overflow-y-auto rounded-t-2xl sm:rounded-xl border-t sm:border border-ritual-accent/30 shadow-2xl">
                                <div className="sticky top-0 bg-ritual-card/95 backdrop-blur p-4 border-b border-ritual-muted/20 flex justify-between items-center z-10">
                                    <h3 className="text-ritual-text font-bold uppercase tracking-widest flex items-center gap-2"><LucideIcon name="Palette" size={18} /> Elegir Tema</h3>
                                    <button onClick={() => setShowThemeSelector(false)} className="text-ritual-muted hover:text-white"><LucideIcon name="X" size={20} /></button>
                                </div>
                                <div className="p-4 grid grid-cols-1 gap-3">
                                    {THEMES.map(theme => (
                                        <button key={theme.id} onClick={() => changeTheme(theme.id)} className={`flex items-center gap-4 p-3 rounded-lg border transition-all group ${menuData.theme === theme.id ? 'border-ritual-accent bg-ritual-accent/10' : 'border-transparent hover:bg-white/5'} `}>
                                            <div className="flex gap-1 shrink-0">
                                                <div className="w-6 h-6 rounded-full border border-white/20 shadow-sm" style={{ backgroundColor: theme.colors.bg }}></div>
                                                <div className="w-6 h-6 rounded-full border border-white/20 shadow-sm" style={{ backgroundColor: theme.colors.card }}></div>
                                                <div className="w-6 h-6 rounded-full border border-white/20 shadow-sm" style={{ backgroundColor: theme.colors.accent }}></div>
                                            </div>
                                            <span className="text-ritual-text font-medium text-sm text-left flex-1 group-hover:text-ritual-accent transition-colors">{theme.name}</span>
                                            {menuData.theme === theme.id && <LucideIcon name="Check" size={16} className="text-ritual-accent" />}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NUEVO: SELECTOR DE ORDEN */}
                    {showSortSelector && isAdmin && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-end sm:items-center justify-center z-50 animate-fadeIn">
                            {/* Añadido max-h-[70vh], flex-col para scroll, y sm:max-w-sm para hacerlo más pequeño */}
                            <div className="bg-ritual-card w-full sm:max-w-sm rounded-t-2xl sm:rounded-xl border-t sm:border border-ritual-accent/30 shadow-2xl max-h-[70vh] flex flex-col">
                                <div className="sticky top-0 bg-ritual-card/95 backdrop-blur p-4 border-b border-ritual-muted/20 flex justify-between items-center z-10 shrink-0">
                                    <h3 className="text-ritual-text font-bold uppercase tracking-widest flex items-center gap-2 text-xs"><LucideIcon name="ArrowUpDown" size={16} /> Ordenar Menú</h3>
                                    <button onClick={() => setShowSortSelector(false)} className="text-ritual-muted hover:text-white"><LucideIcon name="X" size={18} /></button>
                                </div>
                                {/* Añadido overflow-y-auto para el scroll */}
                                <div className="p-4 space-y-4 overflow-y-auto">
                                    {/* Orden de Productos */}
                                    <div className="space-y-2">
                                        <h4 className="text-[10px] uppercase tracking-widest text-ritual-muted border-b border-ritual-muted/20 pb-1">Orden de Platos</h4>
                                        <div className="grid gap-2">
                                            {[
                                                { id: 'price-desc', label: 'Más Caros Primero (BsBsBs → Bs)' },
                                                { id: 'price-asc', label: 'Más Baratos Primero (Bs → BsBsBs)' },
                                                { id: 'alpha', label: 'Alfabético (A → Z)' },
                                                { id: 'variants-max', label: 'Con Más Variantes Primero' },
                                                { id: 'variants-min', label: 'Simples Primero' },
                                            ].map(opt => (
                                                <button key={opt.id} onClick={() => changeSort('product', opt.id)} className={`flex items-center justify-between p-2.5 rounded border text-xs transition-all ${menuData.productSort === opt.id ? 'border-ritual-accent text-ritual-accent bg-ritual-accent/10' : 'border-ritual-muted/20 text-ritual-muted hover:border-ritual-muted'}`}>
                                                    <span>{opt.label}</span>
                                                    {menuData.productSort === opt.id && <LucideIcon name="Check" size={14} />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Orden de Variantes */}
                                    <div className="space-y-2">
                                        <h4 className="text-[10px] uppercase tracking-widest text-ritual-muted border-b border-ritual-muted/20 pb-1">Orden de Sub-productos</h4>
                                        <div className="grid gap-2">
                                            {[
                                                { id: 'price-asc', label: 'Más Baratos Primero' },
                                                { id: 'price-desc', label: 'Más Caros Primero' },
                                                { id: 'alpha', label: 'Alfabético (A → Z)' },
                                            ].map(opt => (
                                                <button key={opt.id} onClick={() => changeSort('variant', opt.id)} className={`flex items-center justify-between p-2.5 rounded border text-xs transition-all ${menuData.variantSort === opt.id ? 'border-ritual-accent text-ritual-accent bg-ritual-accent/10' : 'border-ritual-muted/20 text-ritual-muted hover:border-ritual-muted'}`}>
                                                    <span>{opt.label}</span>
                                                    {menuData.variantSort === opt.id && <LucideIcon name="Check" size={14} />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SELECTOR DE ICONOS CATEGORÍA */}
                    {editingIconCategory && isAdmin && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-end sm:items-center justify-center z-50 animate-fadeIn">
                            <div className="bg-ritual-card w-full sm:max-w-md rounded-t-2xl sm:rounded-xl border-t sm:border border-ritual-accent/30 shadow-2xl max-h-[80vh] flex flex-col">
                                <div className="p-4 border-b border-ritual-muted/20 flex justify-between items-center">
                                    <h3 className="text-ritual-text font-bold uppercase tracking-widest flex items-center gap-2"><LucideIcon name="LayoutGrid" size={18} /> Elegir Icono Categoría</h3>
                                    <button onClick={() => setEditingIconCategory(null)} className="text-ritual-muted hover:text-white"><LucideIcon name="X" size={20} /></button>
                                </div>
                                <div className="p-6 grid grid-cols-5 gap-4 overflow-y-auto">
                                    {AVAILABLE_ICONS.map(iconName => (
                                        <button key={iconName} onClick={() => updateCategoryIcon(iconName)} className="aspect-square flex flex-col items-center justify-center gap-1 rounded-lg border border-ritual-muted/20 hover:bg-ritual-accent/20 hover:border-ritual-accent hover:text-ritual-accent text-ritual-muted transition-all"><LucideIcon name={iconName} size={24} /></button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SELECTOR DE ICONOS PLATO */}
                    {editingIconItem && isAdmin && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-end sm:items-center justify-center z-50 animate-fadeIn">
                            <div className="bg-ritual-card w-full sm:max-w-md rounded-t-2xl sm:rounded-xl border-t sm:border border-ritual-accent/30 shadow-2xl max-h-[80vh] flex flex-col">
                                <div className="p-4 border-b border-ritual-muted/20 flex justify-between items-center">
                                    <h3 className="text-ritual-text font-bold uppercase tracking-widest flex items-center gap-2"><LucideIcon name="LayoutGrid" size={18} /> Elegir Icono Plato</h3>
                                    <button onClick={() => setEditingIconItem(null)} className="text-ritual-muted hover:text-white"><LucideIcon name="X" size={20} /></button>
                                </div>
                                <div className="p-6 grid grid-cols-5 gap-4 overflow-y-auto">
                                    {AVAILABLE_ICONS.map(iconName => (
                                        <button key={iconName} onClick={() => updateItemIcon(iconName)} className="aspect-square flex flex-col items-center justify-center gap-1 rounded-lg border border-ritual-muted/20 hover:bg-ritual-accent/20 hover:border-ritual-accent hover:text-ritual-accent text-ritual-muted transition-all"><LucideIcon name={iconName} size={24} /></button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BARRA FLOTANTE ADMIN */}
                    {isAdmin && (
                        <div className="fixed bottom-0 left-0 right-0 bg-ritual-accent/95 backdrop-blur text-white p-3 text-center text-sm font-bold z-40 flex justify-between items-center px-6 shadow-[0_-5px_20px_rgba(0,0,0,0.5)] animate-fadeIn">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setShowThemeSelector(true)} className="bg-black/20 p-2 rounded-full hover:bg-black/40 transition-colors flex items-center gap-2 px-3" title="Cambiar Tema Visual"><LucideIcon name="Palette" size={16} /><span className="text-[10px] uppercase tracking-wider hidden sm:inline">Temas</span></button>
                                <button onClick={() => setShowSortSelector(true)} className="bg-black/20 p-2 rounded-full hover:bg-black/40 transition-colors flex items-center gap-2 px-3" title="Ordenar Productos"><LucideIcon name="ArrowUpDown" size={16} /><span className="text-[10px] uppercase tracking-wider hidden sm:inline">Orden</span></button>
                                <button onClick={resetDatabase} className="bg-red-500/20 p-2 rounded-full hover:bg-red-500/40 transition-colors flex items-center gap-2 px-3 border border-red-500/30 text-red-100" title="Reiniciar Base de Datos"><LucideIcon name="DatabaseBackup" size={16} /></button>
                                {/* Status Pill */}
                                <div className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-2 border transition-colors ${dbStatus === 'connected' ? 'bg-green-500/20 text-green-100 border-green-500/50' : 'bg-red-500/20 text-red-100 border-red-500/50'} `}><div className={`w-2 h-2 rounded-full ${dbStatus === 'connected' ? 'bg-green-400 shadow-[0_0_5px_rgba(74,222,128,0.8)]' : 'bg-red-400 animate-pulse'}`}></div>{dbStatus === 'connected' ? 'On' : 'Off'}</div>
                            </div>
                            <div className="flex items-center gap-4">
                                {isSaving && (<div className="flex items-center gap-2 text-white/90 animate-pulse"><LucideIcon name="RefreshCw" className="animate-spin" size={14} /><span className="text-[10px] uppercase font-bold tracking-widest hidden sm:inline">Guardando...</span></div>)}
                                <button onClick={() => setIsAdmin(false)} className="bg-black/20 px-4 py-1.5 rounded-full hover:bg-black/40 transition-colors uppercase text-[10px] tracking-widest font-bold">Salir</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
